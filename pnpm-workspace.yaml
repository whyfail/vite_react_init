  - '@vitejs/devtools-kit@0.3.3'
  - '@vitejs/devtools-rolldown@0.3.3'
  - '@vitejs/devtools-self-inspect@0.3.3'
  - '@vitejs/devtools@0.3.3'
  - '@vitejs/plugin-legacy@8.1.0'
  - antd@6.4.4
  - axios@1.18.1
  - eslint-plugin-react-dom@5.10.0
  - eslint-plugin-react-jsx@5.10.0
